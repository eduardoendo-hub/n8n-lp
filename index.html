  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ransition-delay:.05s}\n.reveal-stagger.is-in > *:nth-child(2){transition-delay:.12s}\n.reveal-stagger.is-in > *:nth-child(3){transition-delay:.19s}\n.reveal-stagger.is-in > *:nth-child(4){transition-delay:.26s}\n.reveal-stagger.is-in > *:nth-child(5){transition-delay:.33s}\n.reveal-stagger.is-in > *:nth-child(6){transition-delay:.40s}\n\n/* ==== O QUE VOCÊ VAI CRIAR (cards) ==== */\n.creates{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--line);border:1px solid var(--line);margin-top:48px}\n.create{background:rgba(0,0,0,.7);padding:36px 26px 28px;display:flex;flex-direction:column;gap:18px;transition:background .25s;min-height:300px}\n.create:hover{background:rgba(255,91,26,.05)}\n.create__num{font-family:var(--mono);font-size:11px;letter-spacing:.18em;color:var(--acc)}\n.create__viz{\n  margin-top:auto;height:96px;border:1px solid var(--line);\n  background:\n    repeating-linear-gradient(135deg,rgba(255,91,26,.06) 0 2px,transparent 2px 14px),\n    radial-gradient(ellipse at 50% 50%,rgba(255,91,26,.18),transparent 70%);\n  display:flex;align-items:center;justify-content:center;color:var(--w-3);\n  font-family:var(--mono);font-size:10px;letter-spacing:.2em;\n}\n.create h4{margin:0;font-size:17px;font-weight:500;color:#fff;line-height:1.25;letter-spacing:-.005em}\n.create p{margin:0;font-size:13.5px;color:var(--w-3);line-height:1.5}\n@media (max-width:1100px){.creates{grid-template-columns:repeat(2,1fr)}}\n@media (max-width:560px){.creates{grid-template-columns:1fr}}\n\n/* ==== PERSONAS / PARA QUEM ==== */\n.audience{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);border:1px solid var(--line);margin-top:48px}\n.aud{background:rgba(0,0,0,.7);padding:36px 26px;transition:background .25s;display:flex;flex-direction:column;gap:14px}\n.aud:hover{background:rgba(255,91,26,.05)}\n.aud__name{\n  display:flex;align-items:center;gap:10px;\n  font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppe on:static}}\n\n/* ==== AUTORIDADE / parceria ==== */\n.auth{\n  position:relative;padding:120px 40px;text-align:center;\n  border-top:1px solid var(--line);border-bottom:1px solid var(--line);\n  background:radial-gradient(ellipse 60% 80% at 50% 50%,rgba(255,91,26,.1),transparent 70%);\n}\n.auth__inner{max-width:920px;margin:0 auto}\n.auth__lockup{display:flex;align-items:center;justify-content:center;gap:32px;margin:40px 0;flex-wrap:wrap}\n.auth__lockup img{height:120px;width:auto;filter:drop-shadow(0 8px 40px rgba(0,255,90,.18))}\n@media (max-width:720px){.auth__lockup img{height:72px}}\n.auth__lockup .x{font-size:34px;color:var(--acc);font-weight:300;line-height:1;font-family:var(--serif);font-style:italic}\n.auth__nums{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;margin-top:48px;text-align:left}\n.auth__num{padding:24px 0;border-top:1px solid var(--line)}\n.auth__num b{display:block;font-size:48px;font-weight:700;color:var(--acc);letter-spacing:-.03em;line-height:1;font-family:var(--font)}\n.auth__num span{font-size:13px;color:var(--w-2);margin-top:8px;display:block;line-height:1.4}\n@media (max-width:880px){.auth__nums{grid-template-columns:repeat(2,1fr)}}\n\n/* ==== PRICING ==== */\n.pricing__head{display:grid;grid-template-columns:1fr auto;gap:48px;align-items:end;margin-bottom:48px}\n.pricing__deadline{\n  display:inline-flex;align-items:center;gap:12px;padding:14px 18px;\n  border:1px solid var(--line-2);background:rgba(255,91,26,.06);\n  font-size:12px;letter-spacing:.05em;color:var(--w-2);font-family:var(--mono);\n}\n.pricing__deadline b{color:#fff;font-weight:500}\n.pricing__deadline .pulse{width:8px;height:8px;border-radius:50%;background:var(--acc);box-shadow:0 0 12px var(--acc);animation:pulse 1.8s ease-in-out infinite}\n.pricing{display:grid;grid-template-columns:1.2fr 1fr;gap:1px;background:var(--line);border:1px solid var(--line)}\n.price-main,.price-side{background:rgba(0,0,0,.7);padding:48px 40px}\n.price-main__pre{display:flex;align " name=\"course\" value=\"ia-automacao-n8n\">\n      <button class=\"btn btn--primary modal__submit\" type=\"submit\">\n        Quero receber o contato\n        <svg class=\"arrow\" width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg>\n      <\u002Fbutton>\n    <\u002Fform>\n    <div class=\"modal__success\" id=\"leadSuccess\">\n      <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M9 12l2 2 4-4\"><\u002Fpath><\u002Fsvg>\n      <h4>Recebemos seus dados.<\u002Fh4>\n      <p>Em até 1 dia útil, um consultor entra em contato. Enquanto isso, fique à vontade para acelerar pelo WhatsApp.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n/* =====================================================\n   captureLead — função integrável com RD Station\n   ===================================================== */\nwindow.captureLead = async function captureLead(payload) {\n  // Hook para integração com RD Station Marketing.\n  // Quando integrado, substituir este corpo por uma chamada\n  // ao endpoint /events da RD (ou ao webhook do RD Marketing\n  // configurado na infra Impacta).\n  //\n  // Exemplo de integração futura:\n  //\n  // await fetch('https://api.rd.services/platform/conversions?api_key=PUBLIC_KEY', {\n  //   method: 'POST',\n  //   headers: {'Content-Type': 'application/json'},\n  //   body: JSON.stringify({\n  //     event_type: 'CONVERSION',\n  //     event_family: 'CDP',\n  //     payload: {\n  //       conversion_identifier: 'lp-n8n-interesse',\n  //       email: payload.email,\n  //       name: payload.name,\n  //       mobile_phone: payload.phone,\n  //       cf_perfil: payload.profile,\n  //       cf_curso: payload.course,\n  //       traffic_source: payload.utm_source,\n  //       traffic_medium: payload.utm_medium,\n  //       traffic_campaign: payload.utm_campaign,\n  //       traffic_value: payload.utm_content,\n  //     }\n  //   })\n  // });\n  console.log('[captureLead] payload prepared for RD:', payload);\n  // Disparo de evento de conversão Lead para Pixel/CAPI/GA4 via dataLayer\n  if (window.dataLayer) {\n    window.dataLayer.push({\n      event: 'lead_form_submit',\n      lead_email: payload.email,\n      lead_profile: payload.profile,\n      ...payload,\n    });\n  }\n  // Simula latência de API durante desenvolvimento\n  await new Promise(r => setTimeout(r, 700));\n  return {ok: true};\n};\n\n/* ========== UTM capture (per plan section 6.3/6.4) ========== */\n(() => {\n  const params = new URLSearchParams(window.location.search);\n  const keys = ['utm_source','utm_medium','utm_campaign','utm_content','utm_term'];\n  keys.forEach(k => {\n    const v = params.get(k);\n    if (v) try { sessionStorage.setItem(k, v); } catch(e){}\n  });\n  const fill = () => {\n    keys.forEach(k => {\n      const el = document.querySelector(`input[name='${k}']`);\n      if (!el) return;\n      const v = params.get(k) || (function(){try{return sessionStorage.getItem(k)}catch(e){return null}})();\n      if (v) el.value = v;\n    });\n  };\n  fill();\n})();\n\n/* ========== Hero canvas: neural network ========== */\n(() => {\n  const c = document.getElementById('net');\n  if (!c) return;\n  const ctx = c.getContext('2d');\n  let W, H, dpr, nodes = [];\n  const resize = () => {\n    dpr = Math.min(window.devicePixelRatio || 1, 2);\n    W = c.clientWidth; H = c.clientHeight;\n    c.width = W * dpr; c.height = H * dpr;\n    ctx.setTransform(dpr,0,0,dpr,0,0);\n    const N = Math.floor((W*H)/26000);\n    nodes = Array.from({length: N}, () => ({\n      x: Math.random()*W, y: Math.random()*H,\n      vx: (Math.random()-.5)*.25, vy: (Math.random()-.5)*.25,\n      r: Math.random()*1.4 + .4\n    }));\n  };\n  const tick = () => {\n    ctx.clearRect(0,0,W,H);\n    for (let i = 0; i < nodes.length; i++){\n      const a = nodes[i];\n      a.x += a.vx; a.y += a.vy;\n      if (a.x < 0 || a.x > W) a.vx *= -1;\n      if (a.y < 0 || a.y > H) a.vy *= -1;\n      for (let j = i+1; j < nodes.length; j++){\n        const b = nodes[j];\n        const dx = a.x - b.x, dy = a.y - b.y;\n        const d2 = dx*dx + dy*dy;\n        if (d2 < 22000){\n          const t = 1 - d2/22000;\n          ctx.strokeStyle = `rgba(255,91,26,${t*.32})`;\n          ctx.lineWidth = .6;\n          ctx.beginPath();\n          ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);\n          ctx.stroke();\n        }\n      }\n    }\n    for (const n of nodes){\n      ctx.fillStyle = 'rgba(255,255,255,.9)';\n      ctx.beginPath(); ctx.arc(n.x, n.y, n.r, 0, Math.PI*2); ctx.fill();\n      ctx.fillStyle = 'rgba(255,91,26,.5)';\n      ctx.beginPath(); ctx.arc(n.x, n.y, n.r*3, 0, Math.PI*2); ctx.fill();\n    }\n    requestAnimationFrame(tick);\n  };\n  window.addEventListener('resize', resize);\n  resize(); tick();\n})();\n\n/* ========== Top bar shrink on scroll ========== */\n(() => {\n  const bar = document.getElementById('bar');\n  const onS = () => bar.classList.toggle('is-stuck', window.scrollY > 40);\n  window.addEventListener('scroll', onS, {passive:true}); onS();\n})();\n\n/* ========== Reveal on scroll ========== */\n(() => {\n  const els = document.querySelectorAll('.reveal, .reveal-stagger');\n  const io = new IntersectionObserver(entries => {\n    for (const e of entries) if (e.isIntersecting){ e.target.classList.add('is-in'); io.unobserve(e.target); }\n  }, {threshold: .12, rootMargin: '0px 0px -60px 0px'});\n  els.forEach(el => io.observe(el));\n})();\n\n/* ========== Journey rail progress ========== */\n(() => {\n  const rail = document.getElementById('rail');\n  const journey = document.getElementById('journey');\n  if (!rail || !journey) return;\n  const onS = () => {\n    const r = journey.getBoundingClientRect();\n    const total = r.height;\n    const passed = Math.max(0, Math.min(total, window.innerHeight*.5 - r.top));\n    const pct = Math.max(0, Math.min(100, (passed/total)*100));\n    rail.style.setProperty('--rail', pct + '%');\n  };\n  window.addEventListener('scroll', onS, {passive:true});\n  window.addEventListener('resize', onS);\n  onS();\n})();\n\n/* ========== Ticker duplicate for seamless loop ========== */\n(() => {\n  const t = document.getElementById('ticker');\n  if (!t) return;\n  t.innerHTML = t.innerHTML + t.innerHTML;\n})();\n\n/* ========== Lead form modal ========== */\n(() => {\n  const bg = document.getElementById('leadModal');\n  const inner = document.getElementById('leadModalInner');\n  const form = document.getElementById('leadForm');\n  const success = document.getElementById('leadSuccess');\n  const open = (label) => {\n    bg.classList.add('is-open');\n    inner.classList.remove('is-success');\n    success.classList.remove('is-on');\n    form.style.display = 'flex';\n    if (window.dataLayer) window.dataLayer.push({event:'lead_modal_open', cta_label: label || 'unknown'});\n    setTimeout(() => document.getElementById('lf-name')?.focus(), 60);\n  };\n  const close = () => bg.classList.remove('is-open');\n\n  document.querySelectorAll('[data-open-form]').forEach(b => {\n    b.addEventListener('click', (e) => {\n      e.preventDefault();\n      open(b.getAttribute('data-track') || b.textContent.trim());\n    });\n  });\n  document.querySelectorAll('[data-close-form]').forEach(b => b.addEventListener('click', close));\n  bg.addEventListener('click', (e) => { if (e.target === bg) close(); });\n  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') close(); });\n\n  form.addEventListener('submit', async (e) => {\n    e.preventDefault();\n    const submitBtn = form.querySelector('button[type=submit]');\n    const original = submitBtn.innerHTML;\n    submitBtn.disabled = true;\n    submitBtn.innerHTML = 'Enviando...';\n    const data = Object.fromEntries(new FormData(form).entries());\n    try {\n      await window.captureLead(data);\n      inner.classList.add('is-success');\n      form.style.display = 'none';\n      success.classList.add('is-on');\n    } catch (err) {\n      alert('Não foi possível enviar agora. Tente novamente em instantes ou fale conosco pelo WhatsApp.');\n      submitBtn.disabled = false;\n      submitBtn.innerHTML = original;\n    }\n  });\n})();\n\n/* ========== Webchat toggle stub ==========\n   Substituir por embed real de webchat (RD Conversas, Octadesk, Movidesk, etc.)\n*/\n(() => {\n  const btn = document.getElementById('webchatToggle');\n  if (!btn) return;\n  btn.addEventListener('click', () => {\n    if (window.dataLayer) window.dataLayer.push({event:'webchat_open'});\n    document.querySelector('[data-open-form]')?.click();\n  });\n})();\n\n/* ========== Track CTAs to dataLayer ========== */\n(() => {\n  document.querySelectorAll('[data-track]').forEach(el => {\n    el.addEventListener('click', () => {\n      const id = el.getAttribute('data-track');\n      if (window.dataLayer) window.dataLayer.push({event:'cta_click', cta_id:id});\n    });\n  });\n})();\n<\u002Fscript>\n<script src=\"30a55e23-e3ac-4cd8-90e2-98b659499d74\"><\u002Fscript>\n<!-- Tallos / Megasac webchat widget -->\n<script type=\"application/javascript\" src=\"6f7fee0d-6713-4565-9028-ee3852e7d155\"><\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
